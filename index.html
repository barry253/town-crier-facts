<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Town Crier Facts Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      color: #111;
    }

    aside {
      width: 320px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
      padding: 16px;
      background: #fafafa;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    h2 {
      margin-top: 0;
    }

    h3 {
      margin: 22px 0 8px;
      font-size: 18px;
    }

    button {
      display: block;
      width: 100%;
      text-align: left;
      margin: 4px 0;
      padding: 9px 10px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      background: #eee;
    }

    button.active {
      background: #e6e6e6;
      border-color: #ccc;
      font-weight: bold;
    }

    .toolbar {
      margin-bottom: 18px;
      font-size: 14px;
      color: #444;
    }

    .fact {
      border-bottom: 1px solid #ddd;
      padding: 16px 0;
      line-height: 1.5;
      font-size: 16px;
    }

    .source {
      font-size: 13px;
      color: #555;
      margin-top: 8px;
    }

    .source a {
      color: #005bbb;
    }

    .empty {
      color: #777;
      font-style: italic;
    }
  </style>
</head>

<body>
  <aside>
    <h2>Town Crier Facts</h2>
    <div id="townList">Loading...</div>
  </aside>

  <main>
    <h1>Select a town</h1>

    <div class="toolbar">
      <label>
        <input type="checkbox" id="showSources" checked />
        Show sources
      </label>
    </div>

    <div id="facts" class="empty">
      Choose a town from the list.
    </div>
  </main>

  <script>
    let currentTown = null;
    let currentJson = null;

    function cleanText(value) {
      return String(value || "")
        .replace(/\n/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getGroupLabel(town) {
      if (town.country && town.country !== "United States") {
        return town.country;
      }

      if (town.state) {
        return town.state;
      }

      return "Other";
    }

    function getTownDisplayName(town) {
      if (town.place) return town.place;

      const parts = [town.town];

      if (town.state) parts.push(town.state);
      if (town.country && town.country !== "United States") parts.push(town.country);

      return parts.filter(Boolean).join(", ");
    }

    async function loadIndex() {
      const res = await fetch(`./facts-index.json?v=${Date.now()}`);
      const towns = await res.json();

      towns.sort((a, b) =>
        `${getGroupLabel(a)}-${a.town}`.localeCompare(`${getGroupLabel(b)}-${b.town}`)
      );

      const grouped = {};

      for (const town of towns) {
        const group = getGroupLabel(town);
        if (!grouped[group]) grouped[group] = [];
        grouped[group].push(town);
      }

      const townList = document.getElementById("townList");
      townList.innerHTML = "";

      for (const group of Object.keys(grouped).sort()) {
        const h3 = document.createElement("h3");
        h3.textContent = group;
        townList.appendChild(h3);

        grouped[group].forEach((town) => {
          const btn = document.createElement("button");
          btn.textContent = town.town || town.slug || town.file;
          btn.onclick = () => loadTown(town, btn);
          townList.appendChild(btn);
        });
      }
    }

    async function loadTown(town, clickedButton) {
      currentTown = town;

      document.querySelectorAll("aside button").forEach((btn) => {
        btn.classList.remove("active");
      });

      if (clickedButton) {
        clickedButton.classList.add("active");
      }

      const res = await fetch(`./facts/${town.file}`);
      const json = await res.json();
      currentJson = json;

      renderTown();
    }

    function renderTown() {
      if (!currentTown || !currentJson) return;

      const showSources = document.getElementById("showSources").checked;
      const facts = Array.isArray(currentJson.facts) ? currentJson.facts : [];

      document.querySelector("main h1").textContent =
        getTownDisplayName({
          ...currentTown,
          place: currentJson.place,
          town: currentJson.town || currentTown.town,
          state: currentJson.state || currentTown.state,
          country: currentJson.country || currentTown.country,
        });

      const container = document.getElementById("facts");
      container.className = "";
      container.innerHTML = "";

      if (!facts.length) {
        container.className = "empty";
        container.textContent = "No facts found for this town.";
        return;
      }

      facts.forEach((fact, index) => {
        const div = document.createElement("div");
        div.className = "fact";

        const text = cleanText(fact.text || fact.fact || "");
        const sourceUrl = fact.source || "";
        const sourceObj = currentJson.sources?.find((s) => s.url === sourceUrl);
        const label = sourceObj?.label || fact.sourceLabels?.[0] || "Source";

        div.innerHTML = `
          <strong>${index + 1}.</strong> ${text}
          ${
            showSources && sourceUrl
              ? `<div class="source"><a href="${sourceUrl}" target="_blank">${label}</a></div>`
              : ""
          }
        `;

        container.appendChild(div);
      });
    }

    document.getElementById("showSources").addEventListener("change", renderTown);

    loadIndex();
  </script>
</body>
</html>
