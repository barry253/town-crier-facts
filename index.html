<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Town Crier Facts Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; }
    aside { width: 320px; overflow-y: auto; border-right: 1px solid #ddd; padding: 16px; }
    main { flex: 1; overflow-y: auto; padding: 24px; }
    h1 { margin-top: 0; }
    h3 { margin-bottom: 6px; }
    button {
      display: block;
      width: 100%;
      text-align: left;
      margin: 4px 0;
      padding: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
      border-radius: 6px;
    }
    button:hover { background: #eee; }
    .fact {
      border-bottom: 1px solid #ddd;
      padding: 14px 0;
      line-height: 1.5;
    }
    .source {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
    }
    a { color: #005bbb; }
  </style>
</head>
<body>
  <aside>
    <h2>Town Crier Facts</h2>
    <div id="townList">Loading...</div>
  </aside>

  <main>
    <h1>Select a town</h1>
    <div id="facts"></div>
  </main>

  <script>
    async function loadIndex() {
      const res = await fetch("./facts-index.json");
      const towns = await res.json();

      towns.sort((a, b) =>
        `${a.country}-${a.state}-${a.town}`.localeCompare(`${b.country}-${b.state}-${b.town}`)
      );

      const grouped = {};

      for (const town of towns) {
        const group = town.country === "United States"
          ? town.state || "Unknown State"
          : town.country || "Unknown Country";

        if (!grouped[group]) grouped[group] = [];
        grouped[group].push(town);
      }

      const townList = document.getElementById("townList");
      townList.innerHTML = "";

      for (const group of Object.keys(grouped).sort()) {
        const h3 = document.createElement("h3");
        h3.textContent = group;
        townList.appendChild(h3);

        grouped[group].forEach((town) => {
          const btn = document.createElement("button");
          btn.textContent = town.town;
          btn.onclick = () => loadTown(town);
          townList.appendChild(btn);
        });
      }
    }

    async function loadTown(town) {
      const res = await fetch(`./facts/${town.file}`);
      const json = await res.json();

      const facts = json.facts || json;

      document.querySelector("main h1").textContent =
        `${town.town}${town.state ? ", " + town.state : ""}${town.country && town.country !== "United States" ? ", " + town.country : ""}`;

      const container = document.getElementById("facts");
      container.innerHTML = "";

      facts.forEach((fact, index) => {
        const div = document.createElement("div");
        div.className = "fact";

        const text = fact.text || fact.fact || String(fact);
        const source = fact.source || "";
        const labels = fact.sourceLabels ? fact.sourceLabels.join(", ") : "";

        div.innerHTML = `
          <strong>${index + 1}.</strong> ${text}
          <div class="source">
            ${labels ? `Source: ${labels}<br>` : ""}
            ${source ? `<a href="${source}" target="_blank">${source}</a>` : ""}
          </div>
        `;

        container.appendChild(div);
      });
    }

    loadIndex();
  </script>
</body>
</html>
